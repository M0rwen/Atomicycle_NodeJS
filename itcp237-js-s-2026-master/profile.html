<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Latest compiled and minified CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://code.jquery.com/jquery-3.6.4.min.js"
      integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
      integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="js/user.js"></script>
    <title>Profile</title>
  </head>
  <body>
    <div id="profile"></div>
    <div class="container my-5">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start mb-4">
        <div>
          <h1 class="h3">Your Profile</h1>
          <p class="text-muted">View your account details and edit delivery profile information.</p>
        </div>
        <div class="form-actions mt-3 mt-md-0">
          <button type="button" class="btn btn-outline-primary" id="editProfileBtn">Edit Profile</button>
          <button type="button" class="btn btn-secondary d-none" id="cancelEditBtn">Cancel</button>
        </div>
      </div>

      <div id="profileSummary" class="profile-summary mb-4">
        <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center mb-3">
          <img id="avatarPreview" src="https://via.placeholder.com/130?text=Avatar" alt="Avatar Preview" />
          <div class="ml-md-4 mt-3 mt-md-0">
            <h4 class="profile-title" id="summaryName">Guest Rider</h4>
            <p class="mb-1 text-muted" id="summaryEmail">No email set</p>
            <p class="mb-0 profile-detail" id="summaryAddress">No address added yet</p>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col-md-6 profile-detail"><strong>Phone:</strong> <span id="summaryPhone">Not provided</span></div>
          <div class="col-md-6 profile-detail"><strong>Postcode:</strong> <span id="summaryZip">N/A</span></div>
        </div>
      </div>

      <form id="profileForm" class="d-none">
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="avatar">Avatar</label>
            <input type="file" id="avatar" name="image" accept="image/*" class="form-control-file" />
          </div>
          <div class="form-group col-md-6 text-center text-md-left">
            <img id="avatarPreviewForm" src="https://via.placeholder.com/130?text=Avatar" alt="Avatar Preview" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6 floating">
            <input type="text" id="title" name="title" class="form-control" placeholder=" " />
            <label for="title">Title</label>
          </div>
          <div class="form-group col-md-6 floating">
            <input type="text" id="firstName" name="fname" class="form-control" placeholder=" " />
            <label for="firstName">First Name</label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6 floating">
            <input type="text" id="lastName" name="lname" class="form-control" placeholder=" " />
            <label for="lastName">Last Name</label>
          </div>
          <div class="form-group col-md-6 floating">
            <input type="text" id="phone" name="phone" class="form-control" placeholder=" " required />
            <label for="phone">Phone</label>
          </div>
        </div>
        <div class="form-group">
          <div class="floating">
            <input type="text" id="address" name="addressline" class="form-control" placeholder=" " />
            <label for="address">Address</label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6 floating">
            <input type="text" id="town" name="town" class="form-control" placeholder=" " required />
            <label for="town">Town</label>
          </div>
          <div class="form-group col-md-6 floating">
            <input type="text" id="zipcode" name="zipcode" class="form-control" placeholder=" " />
            <label for="zipcode">Postcode</label>
          </div>
        </div>
        <div class="form-actions pt-2">
          <button type="submit" class="btn btn-primary" id="updateBtn">Save Changes</button>
        </div>
      </form>
    </div>
  </body>
</html>
