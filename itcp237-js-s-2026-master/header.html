<script>
  (function () {
    const token = sessionStorage.getItem('token');
    const role = sessionStorage.getItem('role') ? JSON.parse(sessionStorage.getItem('role')) : 'user';
    const loginLink = document.querySelector('a.nav-link[href="login.html"]');
    const usersMenu = document.getElementById('usersMenu');
    const transactionsMenu = document.getElementById('transactionsMenu');

    if (token && loginLink) {
      loginLink.textContent = 'Logout';
      loginLink.setAttribute('href', '#');
      loginLink.addEventListener('click', function (event) {
        event.preventDefault();
        sessionStorage.clear();
        window.location.href = 'login.html';
      });
    }

    if (role === 'admin' && usersMenu) {
      usersMenu.classList.remove('d-none');
    }

    if (role === 'admin' && transactionsMenu) {
      transactionsMenu.classList.remove('d-none');
    }
  })();
</script>
