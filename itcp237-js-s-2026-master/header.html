<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<nav class="app-navbar mb-4">
  <div class="nav-inner container d-flex align-items-center justify-content-between">
    <a class="brand" href="home.html">Atomicycle</a>
    <button class="nav-toggle d-lg-none" aria-label="Toggle navigation">☰</button>
    <ul class="nav-items d-none d-lg-flex align-items-center">
      <li id="homeNav"><a class="nav-link" href="home.html">Home</a></li>
      <li id="itemsMenu" class="d-none"><a class="nav-link" href="item.html">Items</a></li>
      <li id="usersMenu" class="d-none"><a class="nav-link" href="users.html">Users</a></li>
      <li id="transactionsMenu" class="d-none"><a class="nav-link" href="transactions.html">Transactions</a></li>
      <li id="browseMenu" class="d-none"><a class="nav-link" href="home.html#featuredItems">Browse</a></li>
      <li id="cartIconMenu" class="d-none">
        <a class="nav-link cart-link" href="cart.html" aria-label="Shopping cart">🛒 <span id="itemCount" class="cart-badge">0</span></a>
      </li>
      <li class="nav-account-item">
        <div class="account-dropdown">
          <button class="account-toggle" type="button" aria-expanded="false" aria-label="Account menu">
            👤
          </button>
          <div class="account-menu">
            <a class="account-menu-link" href="login.html" id="accountLoginLink">Login</a>
            <a class="account-menu-link" href="register.html" id="accountRegisterLink">Register</a>
            <a class="account-menu-link d-none" href="profile.html" id="accountProfileLink">Profile</a>
            <a class="account-menu-link d-none" href="#" id="accountLogoutLink">Logout</a>
          </div>
        </div>
      </li>
    </ul>
  </div>
</nav>

<style>
  /* ensure our fonts apply immediately after header loads */
  body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
  h1,h2,h3,h4,h5,h6 { font-family: 'Orbitron', sans-serif; }
</style>

<script>
  (function () {
    const storedUserData = sessionStorage.getItem('user');
    let user = null;
    try {
      user = storedUserData ? JSON.parse(storedUserData) : null;
    } catch (e) {
      user = null;
    }
    const role = user?.role;

    const homeNav = document.getElementById('homeNav');
    const itemsMenu = document.getElementById('itemsMenu');
    const usersMenu = document.getElementById('usersMenu');
    const transactionsMenu = document.getElementById('transactionsMenu');
    const browseMenu = document.getElementById('browseMenu');
    const cartIconMenu = document.getElementById('cartIconMenu');
    const accountToggle = document.querySelector('.account-toggle');
    const accountMenu = document.querySelector('.account-menu');
    const loginLink = document.getElementById('accountLoginLink');
    const registerLink = document.getElementById('accountRegisterLink');
    const profileLink = document.getElementById('accountProfileLink');
    const logoutLink = document.getElementById('accountLogoutLink');

    const updateAuthState = () => {
      const isLoggedIn = Boolean(sessionStorage.getItem('token'));

      if (isLoggedIn) {
        if (loginLink) loginLink.classList.add('d-none');
        if (registerLink) registerLink.classList.add('d-none');
        if (profileLink) profileLink.classList.remove('d-none');
        if (logoutLink) logoutLink.classList.remove('d-none');
      } else {
        if (loginLink) loginLink.classList.remove('d-none');
        if (registerLink) registerLink.classList.remove('d-none');
        if (profileLink) profileLink.classList.add('d-none');
        if (logoutLink) logoutLink.classList.add('d-none');
      }
    };

    updateAuthState();

    if (accountToggle && accountMenu) {
      accountToggle.addEventListener('click', function (event) {
        event.stopPropagation();
        const isOpen = accountMenu.classList.toggle('show');
        accountToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }

    document.addEventListener('click', function () {
      if (accountMenu) {
        accountMenu.classList.remove('show');
      }
      if (accountToggle) {
        accountToggle.setAttribute('aria-expanded', 'false');
      }
    });

    if (logoutLink) {
      logoutLink.addEventListener('click', function (event) {
        event.preventDefault();
        sessionStorage.clear();
        updateAuthState();
        updateNavVisibility();
        window.location.href = 'home.html';
      });
    }

    const updateNavVisibility = () => {
      const currentToken = sessionStorage.getItem('token');
      const currentUser = sessionStorage.getItem('user');
      const parsedUser = currentUser ? JSON.parse(currentUser) : null;
      const currentRole = parsedUser?.role;
      const isLoggedIn = Boolean(currentToken);

      if (homeNav) {
        homeNav.classList.remove('d-none');
      }

      if (itemsMenu) {
        itemsMenu.classList.toggle('d-none', !(currentRole === 'admin' && isLoggedIn));
      }

      if (usersMenu) {
        usersMenu.classList.toggle('d-none', !(currentRole === 'admin' && isLoggedIn));
      }

      if (transactionsMenu) {
        transactionsMenu.classList.toggle('d-none', !(currentRole === 'admin' && isLoggedIn));
      }

      if (browseMenu) {
        browseMenu.classList.toggle('d-none', !(currentRole === 'user' && isLoggedIn));
      }

      if (cartIconMenu) {
        cartIconMenu.classList.toggle('d-none', !(currentRole === 'user' && isLoggedIn));
      }
    };

    updateNavVisibility();

    // Update cart item count per-user (cart_<userId> or cart_guest)
    try {
      const rawUser = sessionStorage.getItem('user');
      let uid = null;
      if (rawUser) {
        try {
          const parsedUser = JSON.parse(rawUser);
          uid = parsedUser?.id ?? parsedUser;
        } catch (e) {
          uid = rawUser;
        }
      }
      const cartKey = uid ? `cart_${uid}` : 'cart_guest';
      const cartRaw = localStorage.getItem(cartKey);
      const cart = cartRaw ? JSON.parse(cartRaw) : [];
      const count = cart.reduce((s, it) => s + (Number(it.quantity) || 0), 0);
      const $count = document.getElementById('itemCount');
      if ($count) {
        if (count > 0) {
          $count.style.display = 'inline-block';
          $count.textContent = String(count);
        } else {
          $count.style.display = 'none';
        }
      }
    } catch (e) {
      // ignore
    }

      // mobile toggle
      const toggle = document.querySelector('.nav-toggle');
      const items = document.querySelector('.nav-items');
      if (toggle && items) {
        toggle.addEventListener('click', () => {
          items.classList.toggle('d-none');
        });
      }
  })();
</script>
