<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<nav class="app-navbar mb-4">
  <div class="nav-inner container d-flex align-items-center justify-content-between">
    <a class="brand" href="home.html">Atomicycle</a>
    <button class="nav-toggle d-lg-none" aria-label="Toggle navigation">☰</button>
    <ul class="nav-items d-none d-lg-flex align-items-center">
      <li><a class="nav-link" href="home.html">Home</a></li>
      <li id="itemsMenu"><a class="nav-link" href="item.html">Items</a></li>
      <li id="usersMenu" class="d-none"><a class="nav-link" href="users.html">Users</a></li>
      <li id="transactionsMenu" class="d-none"><a class="nav-link" href="transactions.html">Transactions</a></li>
      <li><a class="nav-link" href="profile.html">Profile</a></li>
      <li><a class="nav-link cart-link" href="cart.html">🛒 Cart <span id="itemCount" class="cart-badge">0</span></a></li>
      <li><a class="nav-link" href="register.html">Register</a></li>
      <li id="log"><a class="nav-link" href="login.html">Login</a></li>
    </ul>
  </div>
</nav>

<style>
  /* ensure our fonts apply immediately after header loads */
  body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
  h1,h2,h3,h4,h5,h6 { font-family: 'Orbitron', sans-serif; }
</style>

<script>
  (function () {
    const token = sessionStorage.getItem('token');
    const role = sessionStorage.getItem('role') ? JSON.parse(sessionStorage.getItem('role')) : 'user';
    const loginLink = document.querySelector('a.nav-link[href="login.html"]');
    const usersMenu = document.getElementById('usersMenu');
    const transactionsMenu = document.getElementById('transactionsMenu');

    if (token && loginLink) {
      loginLink.textContent = 'Logout';
      loginLink.setAttribute('href', '#');
      loginLink.addEventListener('click', function (event) {
        event.preventDefault();
        sessionStorage.clear();
        window.location.href = 'login.html';
      });
    }

    // Update cart item count per-user (cart_<userId> or cart_guest)
    try {
      const rawUser = sessionStorage.getItem('user');
      let uid = null;
      if (rawUser) {
        try { uid = JSON.parse(rawUser); } catch (e) { uid = rawUser; }
      }
      const cartKey = uid ? `cart_${uid}` : 'cart_guest';
      const cartRaw = localStorage.getItem(cartKey);
      const cart = cartRaw ? JSON.parse(cartRaw) : [];
      const count = cart.reduce((s, it) => s + (Number(it.quantity) || 0), 0);
      const $count = document.getElementById('itemCount');
      if ($count) {
        if (count > 0) {
          $count.style.display = 'inline-block';
          $count.textContent = String(count);
        } else {
          $count.style.display = 'none';
        }
      }
    } catch (e) {
      // ignore
    }

    if (role === 'admin' && usersMenu) {
      usersMenu.classList.remove('d-none');
    }

    if (role === 'admin' && transactionsMenu) {
      transactionsMenu.classList.remove('d-none');
    }

      // mobile toggle
      const toggle = document.querySelector('.nav-toggle');
      const items = document.querySelector('.nav-items');
      if (toggle && items) {
        toggle.addEventListener('click', () => {
          items.classList.toggle('d-none');
        });
      }
  })();
</script>
