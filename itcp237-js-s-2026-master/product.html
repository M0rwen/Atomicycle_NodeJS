<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Details</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .product-main-image {
        width: 100%;
        max-height: 420px;
        object-fit: cover;
        border-radius: 12px;
      }

      .product-thumbnail {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border: 2px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 8px;
      }

      .product-thumbnail.active {
        border-color: #007bff;
      }

      .review-stars {
        color: #f4b400;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="home"></div>

    <div class="container py-5">
      <div class="row">
        <div class="col-lg-6">
          <div id="productImagePanel" class="mb-3"></div>
          <div id="productThumbnails" class="d-flex flex-wrap"></div>
        </div>

        <div class="col-lg-6">
          <h2 id="productTitle" class="mb-3">Loading product...</h2>
          <p id="productDescription" class="text-muted"></p>
          <h3 id="productPrice" class="text-danger mb-3"></h3>
          <p id="productStock" class="font-weight-bold"></p>

          <div class="form-group w-50">
            <label for="productQty">Quantity</label>
            <input type="number" id="productQty" class="form-control" min="1" value="1" />
          </div>

          <div class="mt-4 d-flex flex-wrap gap-2">
            <button id="addToCartBtn" class="btn btn-primary">Add to Cart</button>
            <button id="buyNowBtn" class="btn btn-outline-danger">Buy Now</button>
          </div>
        </div>
      </div>

      <hr class="my-5" />

      <section>
        <h3 class="mb-3">Customer Reviews</h3>

        <div id="reviewNotice" class="alert alert-info d-none"></div>

        <form id="reviewForm" class="card p-4 mb-4 d-none">
          <h5>Write a Review</h5>
          <div class="form-group">
            <label for="reviewerName">Your name</label>
            <input id="reviewerName" name="reviewerName" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="reviewRating">Rating</label>
            <select id="reviewRating" name="reviewRating" class="form-control" required>
              <option value="5">5 Stars</option>
              <option value="4">4 Stars</option>
              <option value="3">3 Stars</option>
              <option value="2">2 Stars</option>
              <option value="1">1 Star</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reviewComment">Comment</label>
            <textarea id="reviewComment" name="reviewComment" class="form-control" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-success">Submit Review</button>
        </form>

        <div id="reviewList"></div>
      </section>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="js/product.js"></script>
  </body>
</html>
