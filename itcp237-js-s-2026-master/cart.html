<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
        integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"
        integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
        integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="js/cart.js"></script>
    <title>Cart</title>
</head>

<body>
    <div id="header"></div>
    <div class="container my-5">
      <div class="row mb-4">
        <div class="col-md-8">
          <h1 class="h3 mb-1">Your Cart</h1>
          <p class="text-muted">Review your items and complete checkout securely.</p>
        </div>
        <div class="col-md-4 text-md-right align-self-center">
          <a href="home.html" class="btn btn-outline-primary btn-sm">Continue Shopping</a>
        </div>
      </div>

      <div class="row gx-4 gy-4">
        <div class="col-lg-7">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <div id="cartTable"></div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <h3 class="h5">Delivery & Payment</h3>
              <p class="text-muted small mb-4">Fill in the delivery details, choose payment, and place your order.</p>

              <div class="form-row">
                <div class="form-group col-12 col-md-6 floating">
                  <input type="text" id="deliveryName" class="form-control" placeholder=" " required>
                  <label for="deliveryName">Name</label>
                </div>
                <div class="form-group col-12 col-md-6 floating">
                  <input type="text" id="deliveryPhone" class="form-control" placeholder=" " required>
                  <label for="deliveryPhone">Phone</label>
                </div>
              </div>

              <div class="form-group floating">
                <input type="text" id="deliveryAddress" class="form-control" placeholder=" " required>
                <label for="deliveryAddress">Delivery Address</label>
              </div>

              <div class="form-row">
                <div class="form-group col-12 col-md-6 floating">
                  <select id="paymentMethod" class="form-control">
                    <option value="cash">Cash</option>
                    <option value="card">Card</option>
                    <option value="paypal">PayPal</option>
                  </select>
                  <label for="paymentMethod">Payment Method</label>
                </div>
                <div class="form-group col-12 col-md-6 floating">
                  <input type="number" id="shippingFee" class="form-control" value="100" min="0" step="0.01" placeholder=" ">
                  <label for="shippingFee">Shipping Fee</label>
                </div>
              </div>

              <div class="form-group floating">
                <input type="text" id="orderNotes" class="form-control" placeholder=" ">
                <label for="orderNotes">Order Notes</label>
              </div>

              <div id="cartSummary" class="alert alert-light border rounded mt-3"></div>
              <button id="checkoutBtn" class="btn btn-primary btn-block mt-3">Proceed to Checkout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
